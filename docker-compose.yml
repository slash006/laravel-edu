services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    working_dir: "/var/www/${PROJECT_DIR}"
    environment:
      - SERVER_HOST=0.0.0.0
      - HOME=/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "if [ -f artisan ]; then php artisan serve --host=0.0.0.0 --port=8000; else tail -f /dev/null; fi"
    ports:
      - "8028:8000"
    volumes:
      - ./:/var/www

  vite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_vite
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    working_dir: "/var/www/${PROJECT_DIR}"
    environment:
      - HOME=/tmp
    command: >
      sh -c "if [ -f package.json ]; then npm run dev; else tail -f /dev/null; fi"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www

  pest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_pest
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    working_dir: "/var/www/${PROJECT_DIR}"
    shm_size: '2gb'
    environment:
      - HOME=/tmp
      - APP_URL=http://app:8000
      - DB_CONNECTION=sqlite
      - DISPLAY=${DISPLAY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
    command: tail -f /dev/null
    volumes:
      - ./:/var/www
      - playwright_cache:/tmp/.cache/ms-playwright
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

  setup:
    profiles:
      - init
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_setup
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: "/var/www"
    environment:
      - HOME=/tmp
    command: >
      sh -c "composer create-project laravel/laravel ${PROJECT_DIR} && cd ${PROJECT_DIR} && npm install"
    volumes:
      - ./:/var/www

volumes:
  playwright_cache: